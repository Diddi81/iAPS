
name: 5. Sync Upstream
run-name: Sync Upstream (${{ github.ref_name }})

env:
  UPSTREAM_URL: "https://github.com/Artificial-Pancreas/iAPS.git"
  WORKFLOW_TOKEN: ${{ secrets.GH_PAT }}
  UPSTREAM_BRANCH: "${{ github.ref_name }}"
  DOWNSTREAM_BRANCH: "${{ github.ref_name }}"
  FETCH_ARGS: ""
  MERGE_ARGS: ""
  PUSH_ARGS: ""
  SPAWN_LOGS: "false"

on:

  schedule:
    - cron: '0 3 * * *'             # täglich um 03:00 UTC

  workflow_dispatch:                 # manuell auslösen

jobs:
  sync:
    name: Sync from Upstream
    runs-on: ubuntu-latest
    outputs:
      has_new_commits: ${{ steps.sync-action.outputs.has_new_commits }}
    steps:
      - name: GitHub Sync to Upstream Repository
        id: sync-action
        uses: Artificial-Pancreas/sync-upstream-repo@master
        with:
          upstream_repo: ${{ env.UPSTREAM_URL }}
          upstream_branch: ${{ env.UPSTREAM_BRANCH }}
          downstream_branch: ${{ env.DOWNSTREAM_BRANCH }}
          token: ${{ env.WORKFLOW_TOKEN }}
          fetch_args: ${{ env.FETCH_ARGS }}
          merge_args: ${{ env.MERGE_ARGS }}
          push_args: ${{ env.PUSH_ARGS }}
          spawn_logs: ${{ env.SPAWN_LOGS }}

  summarize-changes:
    name: Summarize & Notify Changes
    needs: sync
    if: needs.sync.outputs.has_new_commits == 'true'
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GH_PAT }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
    steps:
      - name: Checkout updated repository
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.GH_PAT }}
          ref: ${{ github.ref_name }}
          fetch-depth: 50  # enough to diff recent changes

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests --quiet

      - name: Analyze upstream changes with Claude
        id: analyze-changes
        run: |
          python3 << 'EOF'
          import os, subprocess, requests, json, sys

          GITHUB_OUTPUT = os.environ['GITHUB_OUTPUT']
          ANTHROPIC_KEY = os.environ.get('ANTHROPIC_API_KEY', '')
          UPSTREAM_URL = os.environ.get('UPSTREAM_URL', 'https://github.com/Artificial-Pancreas/iAPS.git')
          BRANCH = os.environ.get('GITHUB_REF_NAME', 'main')

          def write_output(key, value):
              with open(GITHUB_OUTPUT, 'a') as f:
                  f.write(f"{key}={value}\n")

          # Get the new commits from upstream (commits ahead of previous state)
          try:
              # Fetch upstream to compare
              subprocess.run(['git', 'remote', 'add', 'upstream', UPSTREAM_URL],
                           capture_output=True, check=False)
              subprocess.run(['git', 'fetch', 'upstream', BRANCH, '--depth=30'],
                           capture_output=True, check=False)

              # Get commits that were just synced (last 20 commits on the branch)
              commits_raw = subprocess.check_output(
                  ['git', 'log', '--oneline', '-20', f'origin/{BRANCH}'],
                  text=True
              )

              # Get diff summary of recent changes
              diff_stat = subprocess.check_output(
                  ['git', 'diff', '--stat', 'HEAD~10', 'HEAD'],
                  text=True
              )
          except Exception as e:
              print(f"Git operation failed: {e}")
              commits_raw = "(unavailable)"
              diff_stat = "(unavailable)"

          if not ANTHROPIC_KEY:
              print("::notice::ANTHROPIC_API_KEY not set — generating basic summary")
              summary = f"Neue Commits von upstream wurden synchronisiert:\n\n```\n{commits_raw[:2000]}\n```"
              write_output('summary', 'basic')
          else:
              resp = requests.post(
                  'https://api.anthropic.com/v1/messages',
                  headers={
                      'x-api-key': ANTHROPIC_KEY,
                      'anthropic-version': '2023-06-01',
                      'content-type': 'application/json',
                  },
                  json={
                      'model': 'claude-haiku-4-5-20251001',  # fast + cheap for summaries
                      'max_tokens': 1024,
                      'messages': [{
                          'role': 'user',
                          'content': (
                              f"Analysiere diese neuen Commits im iAPS Upstream-Repository "
                              f"(Branch: {BRANCH}) und schreibe eine kurze Zusammenfassung auf Deutsch "
                              f"für einen Diabetiker der diese App nutzt. Fokus auf: neue Features, "
                              f"Bug-Fixes, Sicherheitsrelevantes, Breaking Changes.\n\n"
                              f"Commits:\n{commits_raw[:3000]}\n\n"
                              f"Geänderte Dateien:\n{diff_stat[:2000]}"
                          )
                      }]
                  },
                  timeout=30
              )
              if resp.status_code == 200:
                  summary = resp.json()['content'][0]['text']
                  write_output('summary', 'ai')
              else:
                  summary = f"Neue Commits synchronisiert:\n```\n{commits_raw[:2000]}\n```"
                  write_output('summary', 'basic')

          # Save summary for the notification step
          with open('sync-summary.txt', 'w') as f:
              f.write(summary)

          print("=== Upstream Sync Summary ===")
          print(summary[:500])
          EOF

      - name: Create sync notification issue
        run: |
          SUMMARY=$(cat sync-summary.txt)
          DATE=$(date +"%Y-%m-%d")
          BRANCH="${{ github.ref_name }}"
          REPO="${{ github.repository }}"

          printf '## Upstream Sync Bericht\n\n**Datum:** %s\n**Branch:** `%s`\n**Upstream:** [Artificial-Pancreas/iAPS](https://github.com/Artificial-Pancreas/iAPS)\n\n## Was hat sich geändert?\n\n%s\n\n## Nächste Schritte\n\n- [ ] Änderungen prüfen\n- [ ] [Build manuell starten](https://github.com/%s/actions/workflows/build_iAPS.yml) (falls nicht automatisch)\n- [ ] IPA auf TestFlight testen\n\n---\n*Automatisch erstellt durch den Sync-Workflow.*' \
            "$DATE" "$BRANCH" "$SUMMARY" "$REPO" > /tmp/sync-body.md

          gh issue create \
            --title "Upstream Sync: Neue Änderungen am ${DATE} (Branch: ${BRANCH})" \
            --label "sync" \
            --body-file /tmp/sync-body.md \
          || echo "::notice::Issue-Erstellung übersprungen (möglicherweise existiert bereits eines)"

  trigger-build:
    name: Trigger Build after Sync
    needs: sync
    if: |
      needs.sync.outputs.has_new_commits == 'true' &&
      vars.AUTO_BUILD_AFTER_SYNC == 'true'
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GH_PAT }}
    steps:
      - name: Trigger build_iAPS workflow
        run: |
          gh workflow run build_iAPS.yml \
            --repo "${{ github.repository }}" \
            --ref "${{ github.ref_name }}"
          echo "Build workflow triggered for branch: ${{ github.ref_name }}"
